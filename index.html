<!DOCTYPE html>
<html lang="en" data-theme="blossom">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flat Belly After 40 — A daily plan for women over 40</title>
<meta name="description" content="A flatter belly, the kind way. Flat Belly After 40 is a dietitian-designed daily plan built for perimenopause and menopause — a short set of simple daily tasks that adapt as your body does.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Newsreader:ital,wght@0,400;0,600;1,400;1,600&display=swap">
<style>
/* ============================================================
   SECOND SPRING — landing page styles
   Editorial wellness. Newsreader + Hanken Grotesk.
   ============================================================ */

/* ---- Theme tokens ---- */
:root {
  /* Bloom — vivid spring green + coral blossom */
  --bg:        #F3F8EC;
  --bg-warm:   #E2F0D2;
  --surface:   #FBFEF6;
  --ink:       #18271B;
  --ink-soft:  #4C5A47;
  --line:      #D6E6C5;
  --primary:   #1F9D57;
  --primary-d: #167F44;
  --accent:    #F26B4E;
  --accent-d:  #D6512F;
  --gold:      #EAA62C;

  --radius:    18px;
  --radius-sm: 12px;
  --maxw:      1180px;
  --ease:      cubic-bezier(.22,.61,.36,1);

  --serif: "Newsreader", Georgia, "Times New Roman", serif;
  --sans:  "Hanken Grotesk", system-ui, -apple-system, sans-serif;
}

[data-theme="blossom"] {
  /* Blossom — cherry-blossom pink + fresh green */
  --bg:        #FBF0F3;
  --bg-warm:   #F6DBE3;
  --surface:   #FFFAFB;
  --ink:       #2B1B25;
  --ink-soft:  #6A5560;
  --line:      #F0D4DD;
  --primary:   #DD3F7C;
  --primary-d: #C12A66;
  --accent:    #45A463;
  --accent-d:  #358150;
  --gold:      #E8973C;
}

[data-theme="sunrise"] {
  /* Sunrise — marigold + teal-green */
  --bg:        #FDF6E7;
  --bg-warm:   #FAE6C2;
  --surface:   #FFFCF4;
  --ink:       #2A2012;
  --ink-soft:  #5E543F;
  --line:      #F1DFBB;
  --primary:   #EE7B16;
  --primary-d: #D2660C;
  --accent:    #2A9E6C;
  --accent-d:  #1F7B53;
  --gold:      #F0B53A;
}

/* ---- Reset ---- */
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--ink);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
}
img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }

::selection { background: var(--primary); color: #fff; }

/* ---- Layout ---- */
.wrap { width: 100%; max-width: var(--maxw); margin: 0 auto; padding: 0 28px; }
.section { padding: clamp(72px, 9vw, 130px) 0; position: relative; }

/* ---- Type ---- */
.eyebrow {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--primary);
  display: inline-flex;
  align-items: center;
  gap: 10px;
}
.eyebrow::before {
  content: "";
  width: 26px; height: 1.5px;
  background: var(--primary);
  display: inline-block;
}
.eyebrow.center::after {
  content: "";
  width: 26px; height: 1.5px;
  background: var(--primary);
  display: inline-block;
}
h1, h2, h3 { font-family: var(--serif); font-weight: 400; line-height: 1.05; letter-spacing: -.01em; color: var(--ink); }
.display {
  font-size: clamp(40px, 6vw, 78px);
  line-height: 1.02;
  letter-spacing: -.02em;
  text-wrap: balance;
}
.display em { font-style: italic; color: var(--primary); }
h2.title {
  font-size: clamp(32px, 4.2vw, 52px);
  line-height: 1.06;
  text-wrap: balance;
}
h2.title em { font-style: italic; color: var(--primary); }
.lead {
  font-size: clamp(18px, 1.5vw, 21px);
  color: var(--ink-soft);
  line-height: 1.6;
  max-width: 56ch;
  text-wrap: pretty;
}

/* ---- Buttons ---- */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 10px;
  font-family: var(--sans); font-weight: 700; font-size: 16px;
  padding: 16px 30px; border-radius: 100px;
  transition: transform .25s var(--ease), box-shadow .25s var(--ease);
  white-space: nowrap;
}
.btn-primary {
  background: var(--primary); color: #fff;
  box-shadow: 0 10px 26px -10px color-mix(in oklab, var(--primary) 70%, transparent);
}
.btn-primary:hover { background: var(--primary-d); transform: translateY(-2px); box-shadow: 0 16px 34px -12px color-mix(in oklab, var(--primary) 75%, transparent); }
.btn-ghost { background: transparent; color: var(--ink); border: 1.5px solid var(--line); }
.btn-ghost:hover { border-color: var(--ink); transform: translateY(-2px); }
.btn-lg { padding: 19px 38px; font-size: 17px; }
.btn .arrow { transition: transform .25s var(--ease); }
.btn:hover .arrow { transform: translateX(4px); }

.cta-note { font-size: 14px; color: var(--ink-soft); margin-top: 14px; display: flex; align-items: center; gap: 8px; }

/* ---- Header ---- */
.header {
  position: sticky; top: 0; z-index: 60;
  background: color-mix(in oklab, var(--bg) 82%, transparent);
  backdrop-filter: blur(14px) saturate(1.2);
  border-bottom: 1px solid transparent;
  transition: border-color .3s, background .3s;
}
.header.scrolled { border-bottom-color: var(--line); }
.header-in { display: flex; align-items: center; justify-content: space-between; height: 96px; }
.nav { display: flex; align-items: center; gap: 34px; }
.nav a { font-size: 15px; font-weight: 500; color: var(--ink-soft); transition: color .2s; }
.nav a:hover { color: var(--ink); }
.header-cta { display: flex; align-items: center; gap: 18px; }
.btn-sm { padding: 11px 22px; font-size: 15px; }

/* ---- Logo ---- */
.logo { display: inline-flex; align-items: center; gap: 11px; }
.logo svg { display: block; }
.logo-word { font-family: var(--serif); font-size: 22px; font-weight: 600; letter-spacing: -.01em; color: var(--ink); white-space: nowrap; }
.logo-word .s2 { font-style: italic; font-weight: 400; color: var(--primary); }
.logo-word .s2 { font-style: italic; }

/* ---- Hero ---- */
.hero { padding-top: clamp(48px, 6vw, 80px); padding-bottom: clamp(56px, 7vw, 96px); position: relative; }
.hero-grid { display: grid; grid-template-columns: 1.05fr .95fr; gap: clamp(32px, 5vw, 72px); align-items: center; }
.hero-badge {
  display: inline-flex; align-items: center; gap: 9px;
  background: var(--surface); border: 1px solid var(--line);
  padding: 8px 16px 8px 12px; border-radius: 100px; font-size: 13.5px; font-weight: 600; color: var(--ink-soft);
  margin-bottom: 26px;
  white-space: nowrap;
}
.hero-badge .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 4px color-mix(in oklab, var(--accent) 25%, transparent); }
.hero h1 { margin-bottom: 24px; }
.hero .lead { margin-bottom: 34px; }
.hero-actions { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.hero-proof { display: flex; align-items: center; gap: 18px; margin-top: 40px; flex-wrap: wrap; }
.hero-proof .stars { color: var(--gold); letter-spacing: 2px; font-size: 15px; }
.hero-proof .pt { font-size: 14px; color: var(--ink-soft); max-width: 30ch; }
.hero-proof .pt strong { color: var(--ink); font-weight: 700; }

/* hero visual */
.hero-visual { position: relative; }
.hero-photo {
  position: relative; border-radius: 22px; overflow: hidden;
  aspect-ratio: 4/5; background: var(--bg-warm);
  box-shadow: 0 40px 80px -36px color-mix(in oklab, var(--ink) 45%, transparent);
}
.hero-card {
  position: absolute; background: var(--surface);
  border: 1px solid var(--line); border-radius: 16px;
  box-shadow: 0 24px 44px -20px color-mix(in oklab, var(--ink) 40%, transparent);
  padding: 16px 18px;
}
.hero-card.task { left: -28px; bottom: 38px; width: 252px; }
.hero-card.adapt { right: -22px; top: 46px; width: 196px; }
.task-top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.task-day { font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--primary); }
.task-check { margin-left: auto; width: 22px; height: 22px; border-radius: 50%; background: var(--accent); display: grid; place-items: center; color: #fff; }
.task-title { font-family: var(--serif); font-size: 18px; line-height: 1.2; margin-bottom: 6px; }
.task-sub { font-size: 12.5px; color: var(--ink-soft); }
.adapt-label { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 10px; }
.adapt-bars { display: flex; align-items: flex-end; gap: 5px; height: 44px; }
.adapt-bars span { flex: 1; background: color-mix(in oklab, var(--accent) 40%, var(--bg-warm)); border-radius: 3px; }
.adapt-bars span:last-child { background: var(--accent); }

/* photo placeholder treatment */
.ph {
  width: 100%; height: 100%;
  display: grid; place-items: center;
  background:
    radial-gradient(120% 90% at 30% 20%, color-mix(in oklab, var(--primary) 18%, transparent), transparent 60%),
    linear-gradient(160deg, var(--bg-warm), color-mix(in oklab, var(--accent) 16%, var(--bg-warm)));
  color: color-mix(in oklab, var(--ink) 40%, transparent);
  text-align: center; gap: 8px; font-size: 13px; font-weight: 600; letter-spacing: .04em;
  position: relative;
}
.ph svg { opacity: .55; margin-bottom: 4px; }
.ph .ph-tag { text-transform: uppercase; letter-spacing: .14em; font-size: 11px; }

/* ---- Hero bloom stage ---- */
.hero-h1 { margin-bottom: 24px; font-size: clamp(54px, 8vw, 104px); line-height: .98; letter-spacing: -.03em; }
.hero-centered { text-align: center; }
.hero-centered .wrap { max-width: 880px; display: flex; flex-direction: column; align-items: center; }
.hero-centered .lead { margin-inline: auto; margin-bottom: 32px; }
.hero-centered .hero-actions { justify-content: center; }
.hero-stage-wide { max-width: 560px; margin-top: 44px; aspect-ratio: 16 / 11; }
.hero-bloom-mode .hero-grid { align-items: center; }

.hero-stage {
  position: relative;
  width: 100%;
  aspect-ratio: 1 / 1;
  display: grid;
  place-items: center;
}
.hero-stage .rings {
  position: absolute;
  width: 100%; height: 100%;
  inset: 0;
}

.bigbloom {
  width: 76%; height: 76%;
  overflow: visible;
  filter: drop-shadow(0 26px 50px color-mix(in oklab, var(--primary) 30%, transparent));
  animation: bloomBreathe 7s ease-in-out infinite;
  transform-origin: center;
}
@keyframes bloomBreathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.035) rotate(2deg); } }
.bloom-spin { transform-box: view-box; transform-origin: 20px 20px; }
.bp { transform-box: view-box; }

.stage-card, .stage-chip {
  position: absolute;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 14px;
  box-shadow: 0 22px 44px -22px color-mix(in oklab, var(--ink) 42%, transparent);
}
.stage-card .task-top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.stage-card .task-day { font-size: 10.5px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--primary); white-space: nowrap; }
.stage-card .task-progress { white-space: nowrap; }
.stage-card.task, .stage-card.tasks {
  left: 50%;
  bottom: -2%;
  transform: translateX(-50%);
  width: min(300px, 94%);
  padding: 15px 18px;
}
.stage-card.task .task-title { margin-bottom: 5px; line-height: 1.25; }
.stage-card.task .task-sub { line-height: 1.45; }
.stage-card .task-progress { margin-left: auto; font-size: 11px; font-weight: 700; color: var(--primary); background: color-mix(in oklab, var(--primary) 12%, var(--surface)); padding: 3px 9px; border-radius: 100px; }
.task-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.task-list li { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--ink); line-height: 1.25; white-space: nowrap; }
.task-list li.done { color: var(--ink-soft); }
.task-list li.done span.tcheck + * , .task-list li.done { }
.task-list .tcheck { width: 19px; height: 19px; border-radius: 50%; background: var(--accent); color: #fff; display: grid; place-items: center; flex-shrink: 0; }
.task-list .tcheck.empty { background: transparent; border: 1.5px solid var(--line); }
.task-list li:not(.done) { font-weight: 600; }
.stage-chip { top: 4%; right: 2%; padding: 11px 14px; }
.stage-chip .adapt-label { margin: 0 0 8px; font-size: 10px; letter-spacing: .1em; white-space: nowrap; }
.stage-chip .adapt-bars { height: 22px; width: 100%; gap: 3px; }
.stage-card.task .task-day { white-space: nowrap; }

/* ---- Marquee / logos strip ---- */
.assure { border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); background: color-mix(in oklab, var(--bg-warm) 50%, var(--bg)); }
.assure-in { display: flex; align-items: center; justify-content: space-between; gap: 24px; padding: 22px 0; flex-wrap: wrap; }
.assure-item { display: flex; align-items: center; gap: 11px; font-size: 14.5px; font-weight: 600; color: var(--ink-soft); }
.assure-item svg { color: var(--primary); flex-shrink: 0; }

/* ---- Pain section ---- */
.pain { background: var(--ink); color: #F3EAD9; }
.pain .eyebrow { color: color-mix(in oklab, var(--primary) 75%, #fff); }
.pain .eyebrow::before { background: color-mix(in oklab, var(--primary) 75%, #fff); }
.pain h2.title { color: #FBF4E8; }
.pain h2.title em { color: color-mix(in oklab, var(--primary) 60%, #fff); }
.pain-grid { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(40px, 6vw, 90px); align-items: start; }
.pain-lead { font-size: clamp(19px, 1.6vw, 23px); color: #D8CBB6; line-height: 1.62; text-wrap: pretty; }
.pain-lead strong { color: #FBF4E8; font-weight: 600; }
.pain-list { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; }
.pain-row { display: grid; grid-template-columns: auto 1fr; gap: 18px; padding: 22px 0; border-top: 1px solid rgba(255,255,255,.12); align-items: start; }
.pain-row:last-child { border-bottom: 1px solid rgba(255,255,255,.12); }
.pain-row .pi { width: 40px; height: 40px; border-radius: 11px; background: rgba(255,255,255,.06); display: grid; place-items: center; color: color-mix(in oklab, var(--primary) 60%, #fff); }
.pain-row h4 { font-family: var(--sans); font-size: 16px; font-weight: 700; color: #FBF4E8; margin-bottom: 4px; }
.pain-row p { font-size: 14.5px; color: #BCAE98; line-height: 1.55; }
.pain-quote { margin-top: 16px; font-family: var(--serif); font-style: italic; font-size: clamp(22px, 2.4vw, 30px); line-height: 1.3; color: #FBF4E8; text-wrap: balance; }

/* ---- How it works ---- */
.how-head { text-align: center; max-width: 680px; margin: 0 auto clamp(48px, 6vw, 76px); }
.how-head .lead { margin: 18px auto 0; }
.steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 26px; }
.step {
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
  padding: 32px 30px 34px; position: relative; overflow: hidden;
  transition: transform .3s var(--ease), box-shadow .3s var(--ease);
}
.step:hover { transform: translateY(-4px); box-shadow: 0 26px 50px -26px color-mix(in oklab, var(--ink) 40%, transparent); }
.step-n { font-family: var(--serif); font-size: 15px; color: var(--primary); font-weight: 600; letter-spacing: .04em; margin-bottom: 22px; display: flex; align-items: center; gap: 10px; }
.step-n .ring { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid var(--primary); display: grid; place-items: center; font-style: italic; font-size: 16px; }
.step-ico { width: 52px; height: 52px; border-radius: 13px; background: color-mix(in oklab, var(--primary) 12%, var(--surface)); display: grid; place-items: center; color: var(--primary); margin-bottom: 20px; }
.step h3 { font-size: 23px; margin-bottom: 10px; }
.step p { font-size: 15px; color: var(--ink-soft); line-height: 1.6; }
.step-tag { margin-top: 18px; font-size: 12.5px; font-weight: 600; color: var(--accent-d); display: inline-flex; gap: 7px; align-items: center; }

/* ---- Trust ---- */
.trust { background: color-mix(in oklab, var(--bg-warm) 45%, var(--bg)); }
.trust-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 52px; }
.tcard { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 30px 28px; display: flex; flex-direction: column; }
.tcard .stars { color: var(--gold); letter-spacing: 2px; font-size: 15px; margin-bottom: 16px; }
.tcard blockquote { font-family: var(--serif); font-size: 19px; line-height: 1.4; color: var(--ink); margin-bottom: 22px; flex: 1; text-wrap: pretty; }
.tcard .who { display: flex; align-items: center; gap: 12px; }
.tcard .av { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(150deg, var(--bg-warm), color-mix(in oklab, var(--primary) 22%, var(--bg-warm))); display: grid; place-items: center; font-family: var(--serif); font-size: 17px; color: var(--primary-d); flex-shrink: 0; }
.tcard .who b { font-size: 14.5px; font-weight: 700; display: block; }
.tcard .who span { font-size: 13px; color: var(--ink-soft); }
.placeholder-tag { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-soft); background: color-mix(in oklab, var(--ink) 8%, transparent); padding: 4px 9px; border-radius: 6px; align-self: flex-start; margin-bottom: 16px; }

.credos { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 24px; }
.credo { display: flex; gap: 16px; align-items: flex-start; padding: 26px 24px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); }
.credo .ci { width: 46px; height: 46px; border-radius: 12px; background: color-mix(in oklab, var(--accent) 16%, var(--surface)); color: var(--accent-d); display: grid; place-items: center; flex-shrink: 0; }
.credo h4 { font-family: var(--sans); font-size: 15.5px; font-weight: 700; margin-bottom: 5px; }
.credo p { font-size: 13.5px; color: var(--ink-soft); line-height: 1.5; }

/* ---- Offer ---- */
.offer-grid { display: grid; grid-template-columns: 1.15fr .85fr; gap: clamp(34px, 5vw, 64px); align-items: center; }
.gets { display: grid; gap: 6px; }
.get-row { display: grid; grid-template-columns: auto 1fr; gap: 16px; padding: 18px 0; border-bottom: 1px solid var(--line); align-items: start; }
.get-row:first-child { border-top: 1px solid var(--line); }
.get-row .gi { width: 26px; height: 26px; border-radius: 50%; background: color-mix(in oklab, var(--accent) 18%, var(--surface)); color: var(--accent-d); display: grid; place-items: center; flex-shrink: 0; margin-top: 1px; }
.get-row h4 { font-family: var(--sans); font-size: 16px; font-weight: 700; margin-bottom: 3px; }
.get-row p { font-size: 14px; color: var(--ink-soft); line-height: 1.5; }

.price-card {
  background: var(--surface); border: 1px solid var(--line); border-radius: 22px;
  padding: 36px 34px 34px; box-shadow: 0 30px 60px -34px color-mix(in oklab, var(--ink) 40%, transparent);
  position: relative; overflow: hidden;
}
.price-card::before { content: ""; position: absolute; inset: 0 0 auto 0; height: 5px; background: linear-gradient(90deg, var(--primary), var(--accent)); }
.price-flag { display: inline-block; font-size: 12px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--primary); background: color-mix(in oklab, var(--primary) 12%, var(--surface)); padding: 6px 13px; border-radius: 100px; margin-bottom: 22px; }
.price-trial { font-family: var(--serif); font-size: 40px; line-height: 1; color: var(--ink); margin-bottom: 6px; }
.price-then { font-size: 14.5px; color: var(--ink-soft); margin-bottom: 24px; }
.price-then b { color: var(--ink); font-weight: 700; }
.price-card .btn { width: 100%; }
.price-mini { display: grid; gap: 11px; margin: 24px 0 0; }
.price-mini li { list-style: none; display: flex; gap: 10px; align-items: center; font-size: 14px; color: var(--ink-soft); }
.price-mini svg { color: var(--accent-d); flex-shrink: 0; }
.price-guarantee { margin-top: 22px; padding-top: 20px; border-top: 1px solid var(--line); display: flex; gap: 12px; align-items: center; }
.price-guarantee .gshield { width: 40px; height: 40px; flex-shrink: 0; color: var(--primary); }
.price-guarantee p { font-size: 12.5px; color: var(--ink-soft); line-height: 1.45; }
.price-guarantee b { color: var(--ink); }

/* ---- FAQ ---- */
.faq-grid { display: grid; grid-template-columns: .8fr 1.2fr; gap: clamp(34px, 5vw, 70px); align-items: start; }
.faq-list { display: flex; flex-direction: column; }
.faq-item { border-bottom: 1px solid var(--line); }
.faq-item:first-child { border-top: 1px solid var(--line); }
.faq-q { width: 100%; display: flex; align-items: center; gap: 18px; padding: 24px 0; text-align: left; font-family: var(--serif); font-size: clamp(18px, 1.7vw, 21px); color: var(--ink); }
.faq-q .qmark { margin-left: auto; flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--line); display: grid; place-items: center; color: var(--primary); transition: transform .3s var(--ease), background .3s, color .3s, border-color .3s; }
.faq-item.open .qmark { transform: rotate(45deg); background: var(--primary); color: #fff; border-color: var(--primary); }
.faq-a { max-height: 0; overflow: hidden; transition: max-height .4s var(--ease); }
.faq-a-in { padding: 0 46px 26px 0; font-size: 15.5px; color: var(--ink-soft); line-height: 1.65; text-wrap: pretty; }

/* ---- Final CTA ---- */
.final { background: var(--ink); color: #FBF4E8; text-align: center; overflow: hidden; }
.final::before {
  content: ""; position: absolute; inset: 0;
  background: radial-gradient(60% 80% at 50% 0%, color-mix(in oklab, var(--primary) 30%, transparent), transparent 70%);
  opacity: .7;
}
.final-in { position: relative; max-width: 720px; margin: 0 auto; }
.final h2 { font-size: clamp(36px, 5vw, 64px); color: #FBF4E8; margin-bottom: 22px; }
.final h2 em { font-style: italic; color: color-mix(in oklab, var(--primary) 55%, #fff); }
.final p { font-size: clamp(17px, 1.5vw, 20px); color: #D8CBB6; margin-bottom: 36px; max-width: 52ch; margin-inline: auto; text-wrap: pretty; }
.final .btn-primary { box-shadow: 0 16px 40px -14px color-mix(in oklab, var(--primary) 80%, transparent); }
.final-guarantee { margin-top: 26px; font-size: 14px; color: #BCAE98; display: inline-flex; align-items: center; gap: 10px; }
.final-guarantee svg { color: color-mix(in oklab, var(--primary) 55%, #fff); }

/* ---- Footer ---- */
.footer { background: var(--ink); color: #BCAE98; border-top: 1px solid rgba(255,255,255,.1); padding: 48px 0 40px; }
.footer-top { display: flex; justify-content: space-between; gap: 40px; flex-wrap: wrap; margin-bottom: 36px; }
.footer .logo-word { color: #FBF4E8; }
.footer-tag { font-size: 14px; max-width: 30ch; margin-top: 16px; line-height: 1.5; }
.footer-cols { display: flex; gap: 60px; flex-wrap: wrap; }
.footer-col h5 { font-family: var(--sans); font-size: 12px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: #8C8067; margin-bottom: 16px; }
.footer-col a { display: block; font-size: 14px; color: #C8BBA4; margin-bottom: 10px; transition: color .2s; }
.footer-col a:hover { color: #FBF4E8; }
.footer-legal { border-top: 1px solid rgba(255,255,255,.1); padding-top: 26px; font-size: 12.5px; line-height: 1.6; color: #8C8067; }
.footer-legal p { margin-bottom: 10px; max-width: 95ch; }
.footer-bottom { display: flex; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-top: 16px; font-size: 13px; }

/* ---- Reveal animation ---- */
.reveal { opacity: 0; transform: translateY(22px); transition: opacity .7s var(--ease), transform .7s var(--ease); }
.reveal.in { opacity: 1; transform: none; }

/* ---- Responsive ---- */
@media (max-width: 940px) {
  .hero-grid { grid-template-columns: 1fr; gap: 48px; }
  .hero-visual { max-width: 440px; margin: 0 auto; width: 100%; }
  .hero-stage { max-width: 420px; margin: 0 auto; }
  .pain-grid, .offer-grid, .faq-grid { grid-template-columns: 1fr; }
  .steps, .trust-grid, .credos { grid-template-columns: 1fr; }
  .nav { display: none; }
  .hero-card.task { left: 8px; }
  .hero-card.adapt { right: 8px; }
  .stage-card.task { left: 0; }
  .stage-chip { right: 0; }
}
@media (max-width: 600px) {
  .wrap { padding: 0 20px; }
  .header-cta .btn-ghost { display: none; }
  .hero-card, .stage-card, .stage-chip { display: none; }
  .hero-stage { max-width: 320px; }
  .hero-actions { flex-direction: column; align-items: stretch; }
  .hero-actions .btn { width: 100%; }
  .assure-in { justify-content: center; gap: 16px 28px; }
  .footer-top { flex-direction: column; }
}

/* ---- Image overrides ---- */
.logo-img { height: 56px; width: auto; display: block; object-fit: contain; }
.hero-photo img { width: 100%; height: 100%; object-fit: cover; border-radius: inherit; display: block; }

/* ---- Hamburger button ---- */
.hamburger {
  display: none;
  flex-direction: column;
  justify-content: center;
  gap: 5px;
  width: 40px;
  height: 40px;
  padding: 8px;
  background: none;
  border: none;
  cursor: pointer;
  border-radius: 8px;
  transition: background 0.15s;
  flex-shrink: 0;
}
.hamburger:hover { background: var(--line); }
.hamburger span {
  display: block;
  width: 20px;
  height: 2px;
  background: var(--ink);
  border-radius: 2px;
  transition: transform 0.2s, opacity 0.2s;
  transform-origin: center;
}
.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

/* ---- Mobile menu drawer ---- */
.mobile-menu {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: var(--bg);
  background-color: #fff;
  z-index: 999;
  display: flex;
  flex-direction: column;
  padding: 24px 24px 36px;
  gap: 28px;
  border-top: 1px solid var(--line);
  box-shadow: 0 12px 32px rgba(0,0,0,0.12);
  max-height: calc(100vh - 96px);
  overflow-y: auto;
  animation: slideDown 0.2s ease;
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.mobile-nav {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.mobile-nav a {
  display: block;
  padding: 16px 0;
  font-size: 18px;
  font-weight: 500;
  color: var(--ink);
  text-decoration: none;
  border-bottom: 1px solid var(--line);
}
.mobile-nav a:first-child { border-top: 1px solid var(--line); }
.mobile-cta {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.mobile-cta .btn { width: 100%; justify-content: center; }

/* ---- Responsive breakpoints ---- */
@media (max-width: 940px) {
  .hamburger { display: flex; }
  .header-cta { display: none; }
  .header-in { height: 88px; }
  .logo-img { height: 52px; }
  .mobile-menu { max-height: calc(100vh - 88px); }
}
@media (max-width: 600px) {
  .header-in { height: 76px; }
  .logo-img { height: 46px; }
  .mobile-menu { max-height: calc(100vh - 76px); }
}
@media (max-width: 420px) {
  .header-in { height: 68px; }
  .logo-img { height: 40px; }
  .mobile-menu { max-height: calc(100vh - 68px); }
  .btn-sm { padding: 8px 14px; font-size: 13px; }
}
</style>
